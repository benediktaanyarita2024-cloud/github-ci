name: CI/CD Pipeline

on:
push:
branches: [ master ]

jobs:
build:
runs-on: ubuntu-latest steps:
-	name: Checkout code uses: actions/checkout@v3

-	name: Login ke Docker Hub uses: docker/login-action@v2 with:
username: ${{ secrets.DOCKERHUB_USERNAME }} password: ${{ secrets.DOCKERHUB_TOKEN }}

-	name: Build dan Push Docker Image uses: docker/build-push-action@v4 with:
context: . push: true
tags: ${{ secrets.DOCKERHUB_USERNAME }}/github-ci:latest
